services:
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: cosmos-emulator
    ports:
      - "8081:8081"
      - "1234:1234"
    environment:
      - PROTOCOL=https
    volumes:
      - cosmos-data:/tmp/cosmos/appdata
    healthcheck:
      # エミュレータ本体はコンテナ内 8080 番で /ready /alive /status を HTTP で返す。
      # 旧設定の /_explorer/emulator.pem は vnext-preview には存在せず、常に失敗する。
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  cosmos-data:
